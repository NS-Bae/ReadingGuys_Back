name: ReadingGuys Backend CI

on:
  push:
    branches: 
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 3. 의존성 설치
        run: npm ci

      - name: 4. 환경파일 생성
        run: |
          cat <<'EOF'> .env.production
          ${{ secrets.BACKEND_ENV_PROD }}
          EOF

      - name: 5.빌드
        run: npm run build

      - name: 5-1. 빌드 결과 확인
        run: |
          pwd
          ls -al
          ls -al dist || true
          find dist -maxdepth 3 -type f || true

      - name: 6. SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.LIGHTSAIL_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519

          printf "%s\n" "${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: 7. 서버로 파일 업로드
        run: |
          RSYNC_RSH="ssh -i ~/.ssh/id_ed25519" \
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".github" \
            ./ \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/var/www/rgback/
      
      - name: 8.서버에서 배포 마무리
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} << 'EOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20

            cd /var/www/rgback
            npm ci --omit=dev

            pm2 restart rgback --update-env || pm2 start dist/src/main.js --name rgback
            pm2 save
          EOF